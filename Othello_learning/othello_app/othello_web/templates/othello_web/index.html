{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オセロゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-10 font-sans">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-slate-800 mb-2">Othello vs AI</h1>
        <p class="text-slate-600">You are Black (●) vs AI White (○)</p>
    </header>

    
    <div class="bg-white p-6 rounded-xl shadow-lg flex flex-col items-center gap-6">

        <!-- Score Board -->
        <div class="flex gap-12 text-xl font-bold">
            <div class="flex flex-col items-center">
                <div class="w-8 h-8 rounded-full bg-black mb-2 border-2 border-slate-300"></div>
                <span id="score-black">2</span>
            </div>
            <div class="text-4xl text-slate-300">vs</div>
            <div class="flex flex-col items-center">
                <div class="w-8 h-8 rounded-full bg-white mb-2 border-2 border-slate-300"></div>
                <span id="score-white">2</span>
            </div>
        </div>

        <!-- Notification / Status -->
        <div id="status-message" class="text-lg text-slate-700 font-medium h-8">
            Game Start!
        </div>

        <!-- Game Board (JSがここにマスを追加します) -->
        <div id="board" class="bg-green-700 p-2 rounded-lg shadow-inner grid grid-cols-8 gap-1 w-[340px] h-[340px] sm:w-[480px] sm:h-[480px]">
        </div>

        <!-- Controls -->
        <button id="btn-reset" class="px-6 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800 transition shadow-md">
            Reset Game
        </button>
    </div>
    <!-- ゲームロジック用JSの読み込み -->
    <script src="{% static 'js/game.js' %}"></script>
</body>
</html>
